<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Battle Simulator PokeAPI</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="game-container">
        <div id="battle-scene">
            <div class="pokemon-area enemy-area">
                <div class="status-panel enemy-status">
                    <div class="status-header">
                        <span id="enemy-name" class="name">???</span>
                        <span class="level">Lv<span id="enemy-level">??</span></span>
                    </div>
                    <div class="bar-container">
                        <span class="bar-label">HP</span>
                        <div class="bar-bg">
                            <div id="enemy-hp-fill" class="bar-fill hp-fill"></div>
                        </div>
                    </div>
                </div>
                <div class="sprite-container">
                    <img id="enemy-sprite" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="Enemy Pokemon" class="pokemon-sprite">
                </div>
            </div>

            <div class="pokemon-area player-area">
                <div class="sprite-container">
                    <img id="player-sprite" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="Player Pokemon" class="pokemon-sprite">
                </div>
                <div class="status-panel player-status">
                    <div class="status-header">
                        <span id="player-name" class="name">???</span>
                        <span class="level">Lv<span id="player-level">??</span></span>
                    </div>
                    <div class="bar-container">
                        <span class="bar-label">HP</span>
                        <div class="bar-bg">
                            <div id="player-hp-fill" class="bar-fill hp-fill"></div>
                        </div>
                    </div>
                    <div class="health-text"><span id="player-hp-text">?</span> / <span id="player-hp-max">?</span></div>
                </div>
            </div>
        </div>

        <div id="ui-panel">
            <div id="log-box">
                <p id="log-text">Iniciando aplicación...</p>
            </div>
            <div id="action-box">

            </div>
        </div>
    </div>
    
    <script type="module" src="js/main.js"></script>
</body>
</html>
